<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gantt Vision - Table Format</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- ExcelJS & FileSaver for drawing actual cell-diagram graphics over XLSX -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar for Inputs -->
        <aside class="sidebar">
            <div class="branding">
                <h1>Avance<span class="highlight">Proyectos</span></h1>
                <p>Avance Planificado vs Avance Real</p>
            </div>

            <div class="input-section">
                <label for="excel-data">Pega desde Excel (Nombre, Inicio, Fin, % Plan., % Real)</label>
                <div class="input-table-container">
                    <table class="data-input-table">
                        <thead>
                            <tr>
                                <th>Actividad</th>
                                <th>Inicio</th>
                                <th>Fin</th>
                                <th>% Plan</th>
                                <th>% Real</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="input-tbody">
                            <!-- Filas dinámicas -->
                        </tbody>
                    </table>
                </div>
                <button id="add-row-btn"
                    style="background:#f1f5f9; color:#475569; margin-bottom: 0.2rem; border:1px solid #cbd5e1; font-weight:600; box-shadow:none;"
                    title="Añadir una fila vacía al final">+ Añadir Fila</button>
                <div class="action-buttons">
                    <button id="generate-btn">Generar Gráfico</button>
                    <button id="fullscreen-btn" style="display:none;" title="Ver Completo">🔲 Ver en Pantalla
                        Completa</button>
                </div>
                <div class="action-buttons" style="margin-top: 0.5rem;">
                    <button id="share-link-btn" style="display:none; background: #8b5cf6;"
                        title="Copiar enlace para compartir">🔗 Compartir</button>
                    <button id="export-img-btn" style="display:none; background: #f59e0b;"
                        title="Descargar como Imagen HD">🖼️ Img en HD</button>
                </div>
            </div>
        </aside>

        <!-- Main Chart Area -->
        <main class="gantt-main" id="gantt-wrapper">

            <!-- Leyenda superior -->
            <div class="legend-card top-legend" id="main-legend" style="display: none;">
                <div class="legend-item" style="display:inline-flex; align-items:center;">
                    <div class="legend-bar-sample planned-sample"></div>
                    <span class="label">% Avance Planificado</span>
                </div>
                <div class="legend-item" style="display:inline-flex; align-items:center; margin-left: 1rem;">
                    <div class="legend-bar-sample actual-sample"></div>
                    <span class="label">% Avance Real</span>
                </div>
            </div>

            <div class="empty-state" id="empty-state">
                <div class="empty-icon">📊</div>
                <h2>Sin datos para mostrar</h2>
                <p>Pega tu tabla en el panel izquierdo y haz clic en generar.</p>
            </div>

            <!-- Scrollable Table Wrapper -->
            <div class="table-wrapper" id="table-wrapper" style="display: none;">
                <table class="gantt-table" id="gantt-table">
                    <thead>
                        <tr>
                            <th class="col-main" style="border-top:none; border-left:none;"></th>
                            <th class="col-timeline" id="timeline-header">
                                <!-- Dates injected here -->
                            </th>
                        </tr>
                    </thead>
                    <tbody id="gantt-tbody">
                        <!-- Rows injected here -->
                    </tbody>
                </table>
            </div>

        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
